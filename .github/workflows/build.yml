name: Build Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create icon (optional)
        run: python create_icon.py
        continue-on-error: true
      
      - name: Build executable
        run: pyinstaller build.spec --onefile --windowed
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-manager-exe
          path: dist/minecraft_server_manager.exe
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/minecraft_server_manager.exe
            README.md
          draft: false
          prerelease: false
