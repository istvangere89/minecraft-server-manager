name: Test and Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Check Python syntax
        run: python -m py_compile *.py ui/*.py
      
      - name: Lint with flake8
        run: flake8 *.py ui/*.py --max-line-length=120 --ignore=E501,W503 || true
      
      - name: Run tests
        run: python -m pytest tests.py -v

  build:
    name: Build Windows Executable
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create icon (optional)
        run: python create_icon.py
        continue-on-error: true
      
      - name: Build executable
        run: pyinstaller build.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-manager-exe
          path: dist/minecraft_server_manager.exe
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/minecraft_server_manager.exe
            README.md
          draft: false
          prerelease: false
