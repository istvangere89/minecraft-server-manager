name: Test and Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Check Python syntax
        run: python -m py_compile *.py ui/*.py
      
      - name: Format check with black
        run: black --check *.py ui/*.py
        continue-on-error: false
      
      - name: Import sort check with isort
        run: isort --check-only *.py ui/*.py
        continue-on-error: false
      
      - name: Lint with flake8
        run: flake8 *.py ui/*.py --max-line-length=120 --ignore=E501,W503
        continue-on-error: true
      
      - name: Type checking with mypy
        run: mypy *.py ui/*.py --ignore-missing-imports
        continue-on-error: true
      
      - name: Lint with pylint
        run: pylint *.py ui/*.py --max-line-length=120 --disable=C0111,C0103,W0212
        continue-on-error: true
      
      - name: Security check with bandit
        run: bandit -r . -ll --skip B101
        continue-on-error: true
      
      - name: Run tests with coverage
        run: python -m pytest tests.py -v --cov=. --cov-report=term-missing
        continue-on-error: false

  build:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create icon (optional)
        run: python create_icon.py
        continue-on-error: true
      
      - name: Build executable
        run: pyinstaller build.spec
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-manager-exe
          path: dist/minecraft_server_manager.exe
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/minecraft_server_manager.exe
            README.md
          draft: false
          prerelease: false
